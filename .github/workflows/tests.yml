name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, sqlite3, pdo_sqlite, openssl, bcmath
          coverage: none

      - name: Install dependencies (from Packagist)
        run: composer update --no-interaction --prefer-dist --no-progress

      - name: Pint (code style)
        run: vendor/bin/pint --test

      - name: PHPStan (max)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

      - name: Pest (tests)
        run: vendor/bin/pest
