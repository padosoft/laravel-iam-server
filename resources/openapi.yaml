openapi: 3.1.0
info:
  title: Laravel IAM — Admin API
  description: >
    API di amministrazione del control plane Laravel IAM (doc 16). Autenticata con Bearer JWT,
    fail-closed: ogni rotta dichiara il permesso richiesto e nega di default. Errori in formato
    Problem Details (RFC 9457). Paginazione a cursore, tenant scoping (cross-tenant = 404
    indistinguibile).


    Convenzioni valide per TUTTE le rotte autenticate: senza un Bearer valido la risposta è
    `401` Problem+JSON; senza il permesso richiesto è `403`. Le rotte di mutazione (POST) accettano
    l'header opzionale `Idempotency-Key` (un retry con la stessa chiave non duplica l'effetto).
  version: 1.0.0
servers:
  - url: /api/iam/v1
    description: Prefix configurabile (iam.admin.route_prefix)
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Problem:
      type: object
      description: RFC 9457 Problem Details
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        errors: { type: object, additionalProperties: true }
    Decision:
      type: object
      properties:
        allowed: { type: boolean }
        decision_id: { type: string }
        policy_version: { type: integer }
        requires_step_up: { type: boolean }
        required_aal: { type: [string, "null"] }
        matched: { type: array, items: { type: object } }
        explanation: { type: array, items: { type: string } }
    CursorPage:
      type: object
      properties:
        data: { type: array, items: { type: object } }
        next_cursor: { type: [string, "null"] }
  responses:
    Problem:
      description: Errore (RFC 9457)
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    Unauthorized:
      description: Bearer assente o non valido (RFC 9457)
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    Forbidden:
      description: Permesso mancante (fail-closed, RFC 9457)
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
  parameters:
    Cursor:
      name: cursor
      in: query
      required: false
      schema: { type: string }
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Chiave di idempotenza per le mutazioni (un retry non duplica l'effetto)
      schema: { type: string }
  requestBodies:
    DecisionQuery:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [subject, permission]
            properties:
              subject:
                type: object
                required: [id]
                properties:
                  type: { type: string }
                  id: { type: string }
              permission: { type: string }
              organization: { type: [string, "null"] }
              application: { type: [string, "null"] }
              resource: { type: [string, "null"] }
              context: { type: object, additionalProperties: true }
              current_aal: { type: string }
paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness probe (non autenticato)
      security: []
      responses:
        "200": { description: Il processo risponde }
  /ready:
    get:
      tags: [Health]
      summary: Readiness probe (non autenticato)
      security: []
      responses:
        "200": { description: Pronto }
        "503": { description: Non pronto }
  /users:
    get:
      tags: [Users]
      summary: Elenca gli utenti (cursor)
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CursorPage" } } } }
        "403": { $ref: "#/components/responses/Problem" }
  /users/{user}:
    get:
      tags: [Users]
      summary: Mostra un utente
      parameters: [{ name: user, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/Problem" }
  /users/{user}/effective-permissions:
    get:
      tags: [Users]
      summary: Permessi effettivi di un utente
      parameters: [{ name: user, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/Problem" }
  /users/{user}/suspend:
    post:
      tags: [Users]
      summary: Sospende un utente
      parameters: [{ name: user, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/Problem" }
  /users/{user}/reactivate:
    post:
      tags: [Users]
      summary: Riattiva un utente
      parameters: [{ name: user, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/Problem" }
  /users/{user}/sessions/revoke-all:
    post:
      tags: [Users]
      summary: Revoca tutte le sessioni di un utente
      parameters: [{ name: user, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/Problem" }
  /decisions/check:
    post:
      tags: [Decisions]
      summary: PDP check (allow/deny)
      requestBody: { $ref: "#/components/requestBodies/DecisionQuery" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Decision" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/Problem" }
  /decisions/explain:
    post:
      tags: [Decisions]
      summary: PDP explain (spiegazione passo-passo)
      requestBody: { $ref: "#/components/requestBodies/DecisionQuery" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Decision" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/Problem" }
  /decisions/list-subjects:
    post:
      tags: [Decisions]
      summary: ReBAC list-subjects — chi ha la relazione su una risorsa (M16)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [relation, object]
              properties:
                relation: { type: string, example: editor }
                object:
                  type: object
                  properties:
                    type: { type: string, example: doc }
                    id: { type: string, example: "42" }
      responses:
        "200": { description: Elenco soggetti }
        "422": { $ref: "#/components/responses/Problem" }
  /decisions/list-resources:
    post:
      tags: [Decisions]
      summary: ReBAC list-resources — su cosa il soggetto ha la relazione (M16)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, relation]
              properties:
                subject:
                  type: object
                  properties:
                    type: { type: string, example: user }
                    id: { type: string, example: usr_123 }
                relation: { type: string, example: owner }
      responses:
        "200": { description: Elenco risorse }
        "422": { $ref: "#/components/responses/Problem" }
  /relations:
    post:
      tags: [Decisions]
      summary: Crea una tupla ReBAC (subject, relation, object) — idempotente (M16)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, relation, object]
              properties:
                subject:
                  type: object
                  properties:
                    type: { type: string, example: user }
                    id: { type: string, example: usr_123 }
                relation: { type: string, example: owner }
                object:
                  type: object
                  properties:
                    type: { type: string, example: doc }
                    id: { type: string, example: "42" }
                condition: { type: object, nullable: true }
      responses:
        "201": { description: Tupla creata }
        "422": { $ref: "#/components/responses/Problem" }
    delete:
      tags: [Decisions]
      summary: Revoca una tupla ReBAC (subject, relation, object) — idempotente (M16)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, relation, object]
              properties:
                subject: { type: object }
                relation: { type: string }
                object: { type: object }
      responses:
        "200": { description: Esito revoca }
  /sessions:
    get:
      tags: [Sessions]
      summary: Elenca le sessioni
      responses:
        "200": { description: OK }
        "403": { $ref: "#/components/responses/Problem" }
  /sessions/{session}:
    get:
      tags: [Sessions]
      summary: Mostra una sessione
      parameters: [{ name: session, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/Problem" }
  /sessions/{session}/revoke:
    post:
      tags: [Sessions]
      summary: Revoca una sessione
      parameters: [{ name: session, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/Problem" }
  /access-reviews/campaigns:
    get:
      tags: [AccessReviews]
      summary: Elenca le campagne di review
      responses:
        "200": { description: OK }
    post:
      tags: [AccessReviews]
      summary: Crea una campagna di review
      responses:
        "201": { description: Creata }
        "422": { $ref: "#/components/responses/Problem" }
  /access-reviews/campaigns/{campaign}/open:
    post:
      tags: [AccessReviews]
      summary: Apre una campagna
      parameters: [{ name: campaign, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "409": { $ref: "#/components/responses/Problem" }
  /access-reviews/campaigns/{campaign}/close:
    post:
      tags: [AccessReviews]
      summary: Chiude una campagna
      parameters: [{ name: campaign, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "409": { $ref: "#/components/responses/Problem" }
  /access-reviews/campaigns/{campaign}/items:
    get:
      tags: [AccessReviews]
      summary: Item di una campagna
      parameters: [{ name: campaign, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
  /access-reviews/items/{item}/certify:
    post:
      tags: [AccessReviews]
      summary: Certifica un item
      parameters: [{ name: item, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "409": { $ref: "#/components/responses/Problem" }
  /access-reviews/items/{item}/revoke:
    post:
      tags: [AccessReviews]
      summary: Revoca un item (rimuove il grant)
      parameters: [{ name: item, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "409": { $ref: "#/components/responses/Problem" }
  /access-requests:
    get:
      tags: [AccessRequests]
      summary: Elenca le richieste d'accesso
      responses:
        "200": { description: OK }
    post:
      tags: [AccessRequests]
      summary: Crea una richiesta d'accesso
      responses:
        "201": { description: Creata }
        "422": { $ref: "#/components/responses/Problem" }
  /access-requests/catalog:
    get:
      tags: [AccessRequests]
      summary: Catalogo dei ruoli richiedibili
      responses:
        "200": { description: OK }
  /access-requests/{accessRequest}/approve:
    post:
      tags: [AccessRequests]
      summary: Approva una richiesta (grant time-boxed)
      parameters: [{ name: accessRequest, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "409": { $ref: "#/components/responses/Problem" }
        "422": { $ref: "#/components/responses/Problem" }
  /access-requests/{accessRequest}/reject:
    post:
      tags: [AccessRequests]
      summary: Rifiuta una richiesta
      parameters: [{ name: accessRequest, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "409": { $ref: "#/components/responses/Problem" }
  /recommendations/least-privilege:
    get:
      tags: [Recommendations]
      summary: Proposte least-privilege (draft-only)
      responses:
        "200": { description: OK }
  /applications:
    get:
      tags: [Applications]
      summary: Elenca le applicazioni del registry
      responses:
        "200": { description: OK }
  /applications/{app}:
    get:
      tags: [Applications]
      summary: Mostra un'applicazione
      parameters: [{ name: app, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/Problem" }
  /applications/{app}/manifest:
    get:
      tags: [Applications]
      summary: Manifest corrente applicato
      parameters: [{ name: app, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/Problem" }
  /applications/{app}/manifests:
    post:
      tags: [Applications]
      summary: Sottomette un manifest per un'app
      parameters: [{ name: app, in: path, required: true, schema: { type: string } }]
      responses:
        "201": { description: Creato }
        "422": { $ref: "#/components/responses/Problem" }
  /manifests:
    get:
      tags: [Manifests]
      summary: Elenca i manifest
      responses:
        "200": { description: OK }
  /manifests/{manifest}:
    get:
      tags: [Manifests]
      summary: Mostra un manifest
      parameters: [{ name: manifest, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/Problem" }
  /manifests/{manifest}/diff:
    get:
      tags: [Manifests]
      summary: Diff del manifest vs stato corrente
      parameters: [{ name: manifest, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
  /manifests/{manifest}/approve:
    post:
      tags: [Manifests]
      summary: Approva un manifest
      parameters: [{ name: manifest, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "409": { $ref: "#/components/responses/Problem" }
  /manifests/{manifest}/reject:
    post:
      tags: [Manifests]
      summary: Rifiuta un manifest
      parameters: [{ name: manifest, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "409": { $ref: "#/components/responses/Problem" }
  /manifests/{manifest}/apply:
    post:
      tags: [Manifests]
      summary: Applica un manifest approvato
      parameters: [{ name: manifest, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "409": { $ref: "#/components/responses/Problem" }
  /manifests/{manifest}/rollback:
    post:
      tags: [Manifests]
      summary: Rollback all'ultimo manifest applicato
      parameters: [{ name: manifest, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "409": { $ref: "#/components/responses/Problem" }
  /audit/events:
    get:
      tags: [Audit]
      summary: Elenca gli eventi di audit (cursor)
      parameters:
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200": { description: OK }
  /audit/verify-chain:
    post:
      tags: [Audit]
      summary: Verifica la hash-chain di audit (tamper-evidence)
      responses:
        "200": { description: OK }
  # ── M17: Admin API completion (doc 19) ──────────────────────────────────────
  /access-requests/{accessRequest}/steps:
    get:
      tags: [AccessRequests]
      summary: Elenca gli step della catena di approvazione (multi-step, M17)
      parameters: [{ name: accessRequest, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/Problem" }
  /access-requests/{accessRequest}/steps/{step}/approve:
    post:
      tags: [AccessRequests]
      summary: Approva uno step (AND sequenziale; grant solo all'ultimo step)
      parameters:
        - { name: accessRequest, in: path, required: true, schema: { type: string } }
        - { name: step, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200": { description: Step approvato (granted=true se catena completata) }
        "409": { $ref: "#/components/responses/Problem" }
  /access-requests/{accessRequest}/steps/{step}/reject:
    post:
      tags: [AccessRequests]
      summary: Rifiuta uno step e la richiesta (fail-closed, nessun grant)
      parameters:
        - { name: accessRequest, in: path, required: true, schema: { type: string } }
        - { name: step, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200": { description: Richiesta rifiutata }
        "409": { $ref: "#/components/responses/Problem" }
  /groups:
    get:
      tags: [Groups]
      summary: Elenca i gruppi (cursor, tenant-scoped)
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200": { description: OK }
    post:
      tags: [Groups]
      summary: Crea un gruppo
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, name]
              properties:
                key: { type: string, example: eng }
                name: { type: string, example: Engineering }
                source: { type: string, example: manual }
      responses:
        "201": { description: Gruppo creato }
        "409": { $ref: "#/components/responses/Problem" }
  /groups/{group}:
    get:
      tags: [Groups]
      summary: Dettaglio gruppo
      parameters: [{ name: group, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/Problem" }
    patch:
      tags: [Groups]
      summary: Aggiorna un gruppo (name/source)
      parameters:
        - { name: group, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200": { description: OK }
    delete:
      tags: [Groups]
      summary: Revoca (soft) un gruppo
      parameters:
        - { name: group, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200": { description: OK }
  /groups/{group}/members:
    get:
      tags: [Groups]
      summary: Elenca i membri del gruppo
      parameters:
        - { name: group, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200": { description: OK }
    post:
      tags: [Groups]
      summary: Aggiunge un membro (scrive anche la tupla ReBAC member, M16)
      parameters:
        - { name: group, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [member_type, member_id]
              properties:
                member_type: { type: string, enum: [user, group, service_account] }
                member_id: { type: string }
      responses:
        "201": { description: Membro aggiunto }
    delete:
      tags: [Groups]
      summary: Rimuove un membro (revoca anche la tupla ReBAC member)
      parameters:
        - { name: group, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200": { description: OK }
  /federated-providers:
    get:
      tags: [Federated]
      summary: Elenca i provider federati (secret mai restituito)
      parameters:
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200": { description: OK }
    post:
      tags: [Federated]
      summary: Crea un provider federato (client_secret write-only, cifrato)
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, driver]
              properties:
                key: { type: string, example: google }
                driver: { type: string, enum: [socialite, oidc, saml] }
                client_id: { type: string }
                client_secret: { type: string, description: write-only mai restituito }
      responses:
        "201": { description: Provider creato }
        "409": { $ref: "#/components/responses/Problem" }
  /federated-providers/{provider}:
    get:
      tags: [Federated]
      summary: Dettaglio provider
      parameters: [{ name: provider, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/Problem" }
    patch:
      tags: [Federated]
      summary: Aggiorna un provider (client_secret ruotabile, write-only)
      parameters:
        - { name: provider, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200": { description: OK }
    delete:
      tags: [Federated]
      summary: Elimina un provider
      parameters:
        - { name: provider, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200": { description: OK }
  /federated-providers/{provider}/test:
    post:
      tags: [Federated]
      summary: Valida la config (discovery) senza esporre il secret
      parameters:
        - { name: provider, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200": { description: Esito validazione (ok + issues) }
  /directory-sources:
    get:
      tags: [Directory]
      summary: Elenca le sorgenti directory (bind_secret mai restituito)
      parameters:
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200": { description: OK }
    post:
      tags: [Directory]
      summary: Crea una sorgente directory (bind_secret write-only, cifrato)
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, name, host, base_dn]
              properties:
                key: { type: string, example: corp-ad }
                name: { type: string }
                type: { type: string, enum: [ldap, scim, saml] }
                host: { type: string }
                base_dn: { type: string }
                bind_dn: { type: string }
                bind_secret: { type: string, description: write-only mai restituito }
      responses:
        "201": { description: Sorgente creata }
        "409": { $ref: "#/components/responses/Problem" }
  /directory-sources/{source}:
    get:
      tags: [Directory]
      summary: Dettaglio sorgente
      parameters: [{ name: source, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/Problem" }
    patch:
      tags: [Directory]
      summary: Aggiorna una sorgente (bind_secret ruotabile, write-only)
      parameters:
        - { name: source, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200": { description: OK }
    delete:
      tags: [Directory]
      summary: Elimina una sorgente
      parameters:
        - { name: source, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200": { description: OK }
  /directory-sources/{source}/sync:
    post:
      tags: [Directory]
      summary: Trigger sync (delegato al modulo directory; 409 se non attivo)
      parameters:
        - { name: source, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202": { description: Sync accodata }
        "409": { $ref: "#/components/responses/Problem" }
  /directory-sources/{source}/test:
    post:
      tags: [Directory]
      summary: Test bind (delegato al modulo directory; 409 se non attivo)
      parameters:
        - { name: source, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200": { description: Esito test }
        "409": { $ref: "#/components/responses/Problem" }
  /policies-wizard/permissions:
    get:
      tags: [PolicyWizard]
      summary: Catalogo permessi/ruoli per comporre una policy
      parameters:
        - { name: app, in: query, required: false, schema: { type: string } }
      responses:
        "200": { description: OK }
  /policies-wizard/preview:
    post:
      tags: [PolicyWizard]
      summary: Anteprima d'impatto di un grant proposto (NON scrive nulla)
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, privilege_type, privilege_key]
              properties:
                subject: { type: object }
                privilege_type: { type: string, enum: [permission, role] }
                privilege_key: { type: string }
      responses:
        "200": { description: Anteprima (writes=false) }
  /policies-wizard/commit:
    post:
      tags: [PolicyWizard]
      summary: Crea il grant proposto (idempotente)
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses:
        "201": { description: Grant creato }
        "200": { description: Grant già esistente (idempotente) }
  /webhooks:
    get:
      tags: [Webhooks]
      summary: Elenca le subscription webhook (secret mai restituito)
      parameters:
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200": { description: OK }
    post:
      tags: [Webhooks]
      summary: Crea una subscription (secret HMAC write-only; URL anti-SSRF)
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, event_filters, secret]
              properties:
                url: { type: string, example: "https://hook.example/in" }
                event_filters: { type: array, items: { type: string } }
                secret: { type: string, description: write-only HMAC }
      responses:
        "201": { description: Subscription creata }
        "422": { $ref: "#/components/responses/Problem" }
  /webhooks/deliveries/{delivery}/replay:
    post:
      tags: [Webhooks]
      summary: DLQ replay di una delivery failed (riusa il WebhookRetrier)
      parameters:
        - { name: delivery, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200": { description: Replay accodato }
        "409": { $ref: "#/components/responses/Problem" }
  /webhooks/{subscription}:
    get:
      tags: [Webhooks]
      summary: Dettaglio subscription
      parameters: [{ name: subscription, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/Problem" }
    patch:
      tags: [Webhooks]
      summary: Aggiorna una subscription (secret ruotabile, write-only)
      parameters:
        - { name: subscription, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200": { description: OK }
    delete:
      tags: [Webhooks]
      summary: Elimina una subscription
      parameters:
        - { name: subscription, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200": { description: OK }
  /webhooks/{subscription}/test:
    post:
      tags: [Webhooks]
      summary: Invio di un evento di prova (passa dall'URL-guard e dal signer)
      parameters:
        - { name: subscription, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200": { description: Esito consegna di prova }
  /webhooks/{subscription}/deliveries:
    get:
      tags: [Webhooks]
      summary: Storico consegne (cursor)
      parameters:
        - { name: subscription, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200": { description: OK }
  /metrics/decisions:
    get:
      tags: [Metrics]
      summary: Aggregazioni decisioni (allow/deny, top denied, step-up) bounded
      parameters:
        - { name: from, in: query, required: false, schema: { type: string, format: date-time } }
        - { name: to, in: query, required: false, schema: { type: string, format: date-time } }
        - { name: app, in: query, required: false, schema: { type: string } }
      responses:
        "200": { description: OK }
  /metrics/grants:
    get:
      tags: [Metrics]
      summary: Aggregazioni grant (active/expired/privileged/stale) bounded
      responses:
        "200": { description: OK }
  /metrics/audit:
    get:
      tags: [Metrics]
      summary: Aggregazioni audit (per tipo, integrità chain, outbox lag) bounded
      parameters:
        - { name: from, in: query, required: false, schema: { type: string, format: date-time } }
        - { name: to, in: query, required: false, schema: { type: string, format: date-time } }
      responses:
        "200": { description: OK }
